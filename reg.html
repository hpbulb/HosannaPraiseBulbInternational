<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eden Registation Form</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-LN+7fdVzj6u52u30Kp6M/trliBMCMKTyK833zpbD+pXdCLuTusPj697FH4R/5mcr" crossorigin="anonymous">   

</head>

<body>
    <div class="containter text-center text-dark fw-bold ">
        <div class="row">
            <div class="col">
                <img src="Eden BULB LOGO OR BARGE.png" alt="..." height="200">
            </div>
            <h1>
                SCHOOL REGISTRATION FORM ACEDEMIC 2025/2026
            </h1>
        </div>
    </div>
<!--Registration Information-->
    <div class="text-start text-black fw-bold bg-light text-dark shadow-lg p-3 mb-5 bg-secondary rounded">
        <!--personal information-->
        <h3 style="text-decoration: underline;">Student Information</h3><br>
        <div class="row">
            <div class="col">
                <label for="firstname" class="form-label">Firstname</label>
                <input type="text" class="form-control" placeholder="firstname" aria-label="First name">
            </div> 
            <div class="col">
                <label for="lastname" class="form-label">Lastname</label>
                <input type="text" class="form-control" placeholder="lastname" aria-label="Last name">
            </div>
        </div>
         <label for="dob" class="col form-label">
                Date Of Birth
            </label><br>
            <input type="date" class="form-control" placeholder="dateofbirth"> 
          <div class="row">
             <div class="col">
                <label for="place of birth" class="form-label">Place Of Birth</label>
                <input type="text" class="form-control" placeholder="place of birth" aria-label="place of birth">
            </div> 
             <div class="col">
                <label for="nationality" class="form-label">Nationality</label>
                <input type="text" class="form-control" placeholder="nationality" aria-label="nationality">
            </div>
                        <label for="gender">Gender</label>
            <select name="" id="" class="form-select" aria-label="default select example">
              <option value="1">None</option>
                <option value="1">Male</option>
                   <option value="2">Female</option>
                      <option value="3">Prefer not to say</option>
            </select>
         </div>
         <div class="row">
             <div class="col">
                <label for="soo" class="form-label">State Of Origin</label>
                <input type="text" class="form-control" placeholder="state of origin" aria-label="soo">
            </div> 
            <div class="col">
                <label for="lga" class="form-label">Local Government Area</label>
                <input type="text" class="form-control" placeholder="@examplebendelga" aria-label="LGA">
         </div>
         <div class="col">
                <label for="religion" class="form-label">Religion/Denomination</label>
                <input type="text" class="form-control" placeholder="@examplehpbulbint'l" aria-label="religion">
            </div>
            </div>
            <div class="col">
                <label for="house addresss" class="form-label">Home Address</label>
                <input type="text" class="form-control" placeholder="home address" aria-label="home address">
                
    </div>
    <div class="col">
        <label for="class appyling for" class="form-label">Class Applying For</label>
        <select name="" id="" class="form-select" aria-label="default select example">
            <option value="1" class="value 1">Creche</option>
            <option value="2">Pre Nursery</option>
            <option value="3">Nursery 1</option>
            <option value="4">Nursery 2</option>
            <option value="5">Nursery 3</option> <br>
            <option value="6">Grade 1</option>
            <option value="7">Grade 2</option>
            <option value="8">Grade 3</option>
            <option value="9">Grade 4</option>
            <option value="10">Grade 5</option> <br>
            <option value="11">Junior High School 1</option>
            <option value="12">Junior High School 2</option>
            <option value="13">Junior High School 3</option>
        </select>
<div class="row ">
        <div class="col">
            <label for="previousschoolattended" class="form-label">Previous School Attended (if any) </label>
            <input type="text" class="form-control" placeholder="name of school attended" aria-label="name of school attended">
        </div>
        <div class="col">
            <label for="Class completed" class="form-label">Class Completed</label>
            <input type="text" class="form-control" placeholder="grade1-grade5" aria-label="class completed">
        </div>
        <div class="col">
            <label for="Class completed" class="form-label">Class Completed</label>
            <input type="text" class="form-control" placeholder="grade1-grade5" aria-label="class completed">
        </div>
        <div class="col">
            <label for="reason for leaving" class="form-label">Reason For leaving</label>
            <input type="text" class="form-control" placeholder="" aria-label="reason for leaving">
        </div>
        <label for="image" class="form-label">Passport Photograph</label>
        <input type="file" class="form-control" aria-label="image">
    </div>
    </div><br>
    <button type="button" value="SUBMIT EMAIL TO: info@whatshouldisay.ca"   class="btn btn-primary">Submit</button>
     




        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js" integrity="sha384-ndDqU0Gzau9qJ1lfW4pNLlhNTkCfHzAVBReH9diLvGRem5+R9g2FzA8ZGN954O5Q" crossorigin="anonymous"></script>

</body>
</html>
